services:

  postgres:
    # pgvector/pgvector : image officielle PostgreSQL + extension vector préinstallée
    # Tag pg17 = PostgreSQL 17, la version la plus récente stable
    image: pgvector/pgvector:pg17
    container_name: datascraper_db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       datascraper
      POSTGRES_USER:     datascraper
      POSTGRES_PASSWORD: datascraper_secret   # ← change en production

    ports:
      # Expose uniquement sur localhost — ne pas ouvrir sur 0.0.0.0 en production
      - "127.0.0.1:5432:5432"

    volumes:
      # Persistance des données sur le disque du Raspberry Pi
      - postgres_data:/var/lib/postgresql/data
      # Applique le schéma automatiquement au premier démarrage
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

    # Paramètres de performance adaptés à un Raspberry Pi
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c maintenance_work_mem=32MB
        -c max_connections=20
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datascraper -d datascraper"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: lefilapi
    depends_on:
      - postgres
      
    ports:
      # Expose uniquement sur localhost — ne pas ouvrir sur 0.0.0.0 en production
      - "127.0.0.1:8000:8000"
      
  node:
    image: "node:24"
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=production
    volumes:
      - ./frontend:/home/node/app
    ports: # use if it is necessary to expose the container to the host machine
      - "3000:3000"
    depends_on:
      - api
    command: ["npm", "run", "start"]

volumes:
  postgres_data:
    driver: local